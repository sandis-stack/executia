<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXECUTIA — Operator</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f6f7fb; --white: #fff; --line: #e5e7eb;
  --text: #0A1F44; --muted: #6b7280; --soft: #f1f5f9;
  --green: #15803d; --red: #dc2626; --amber: #b45309;
  --mono: 'JetBrains Mono', monospace;
}
body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
header { background: var(--white); border-bottom: 1px solid var(--line); padding: 13px 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
.brand { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: .16em; }
.token-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.token-row input { width: 200px; padding: 7px 10px; border: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--text); background: var(--white); }
.live-badge { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }
.live-dot.on { background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Buttons */
button { padding: 7px 12px; border: 1px solid var(--text); background: var(--text); color: var(--white); font-family: var(--mono); font-size: 10px; letter-spacing: .08em; cursor: pointer; }
button.ghost  { background: var(--white); color: var(--text); }
button.green  { background: var(--green); border-color: var(--green); }
button.red    { background: var(--red);   border-color: var(--red); }
button.amber  { background: var(--amber); border-color: var(--amber); }

/* KPI strip */
.kpi-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; padding: 12px 20px; }
.kpi { background: var(--white); border: 1px solid var(--line); padding: 10px 14px; }
.kpi-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; color: var(--muted); margin-bottom: 3px; }
.kpi-val { font-family: var(--mono); font-size: 20px; font-weight: 700; }
.kpi-val.amber { color: var(--amber); } .kpi-val.red { color: var(--red); } .kpi-val.green { color: var(--green); }

/* Filters + search */
.toolbar { display: flex; gap: 8px; padding: 0 20px 10px; flex-wrap: wrap; align-items: center; }
.toolbar button { font-size: 9px; padding: 5px 10px; }
.toolbar button.active { background: var(--text); color: var(--white); }
.toolbar input { padding: 6px 10px; border: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--text); background: var(--white); width: 220px; max-width: 100%; }

/* Layout */
.container { display: grid; grid-template-columns: 340px 1fr; gap: 14px; padding: 0 20px 32px; }
.panel { background: var(--white); border: 1px solid var(--line); }
.panel-head { padding: 9px 14px; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 9px; letter-spacing: .12em; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }

/* List */
.list { max-height: calc(100vh - 300px); overflow-y: auto; }
.item { padding: 11px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
.item:hover { background: var(--soft); }
.item.active { background: #e0ecff; border-left: 3px solid var(--text); }
.item-id { font-family: var(--mono); font-size: 12px; font-weight: 700; }
.item-meta { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 4px; }
.badge { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .1em; display: inline-block; padding: 2px 7px; border: 1px solid; margin-top: 5px; }
.APPROVED      { color: var(--green); border-color: #b7dfc2; background: #f0faf3; }
.BLOCKED       { color: var(--red);   border-color: #f0b7b7; background: #fff5f5; }
.REQUIRES_REVIEW, .UNDER_REVIEW { color: var(--amber); border-color: #ecd6a5; background: #fffaf0; }
.ARCHIVED      { color: var(--muted); border-color: var(--line); }

/* Detail */
.detail-wrap { overflow-y: auto; max-height: calc(100vh - 300px); }
.detail { padding: 16px; }
.section { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
.section:last-child { border-bottom: none; margin-bottom: 0; }
.lbl { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; color: var(--muted); margin-bottom: 4px; }
.val { font-size: 13px; line-height: 1.6; word-break: break-word; }
.val.mono { font-family: var(--mono); font-size: 12px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
textarea { width: 100%; min-height: 72px; resize: vertical; border: 1px solid var(--line); padding: 8px 10px; font-family: var(--mono); font-size: 12px; color: var(--text); background: var(--white); }
.actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.action-msg { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 6px; min-height: 16px; }
pre { font-family: var(--mono); font-size: 11px; line-height: 1.5; background: #f9fafb; border: 1px solid var(--line); padding: 9px 11px; overflow: auto; max-height: 160px; white-space: pre-wrap; }

/* Audit trail */
.audit-line { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 11px; }
.audit-line:last-child { border-bottom: none; }
.audit-ts { color: var(--muted); font-size: 10px; min-width: 120px; }
.audit-action { font-weight: 700; min-width: 100px; }
.audit-note { color: var(--muted); }

.empty { padding: 28px 14px; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; }

@media (max-width: 820px) {
  .container { grid-template-columns: 1fr; }
  .list { max-height: 260px; }
  .detail-wrap { max-height: none; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<header>
  <div class="brand">EXECUTIA — OPERATOR</div>
  <div class="token-row">
    <input id="token" type="password" placeholder="OPERATOR TOKEN" autocomplete="off">
    <input id="reviewer" type="text" placeholder="REVIEWER NAME" style="width:160px;" autocomplete="off">
    <button onclick="saveToken()">SAVE</button>
    <button class="ghost" onclick="load()">↻ REFRESH</button>
    <div class="live-badge"><span class="live-dot" id="liveDot"></span><span id="liveLabel">OFFLINE</span></div>
    <span id="authMsg" style="font-family:var(--mono);font-size:9px;color:var(--muted);"></span>
  </div>
</header>

<div class="kpi-row">
  <div class="kpi"><div class="kpi-lbl">TOTAL</div><div class="kpi-val" id="kTotal">—</div></div>
  <div class="kpi"><div class="kpi-lbl">REQUIRES REVIEW</div><div class="kpi-val amber" id="kReview">—</div></div>
  <div class="kpi"><div class="kpi-lbl">BLOCKED</div><div class="kpi-val red" id="kBlocked">—</div></div>
  <div class="kpi"><div class="kpi-lbl">APPROVED</div><div class="kpi-val green" id="kApproved">—</div></div>
</div>

<div class="toolbar">
  <button class="active" onclick="setFilter(this,'')">ALL</button>
  <button class="ghost"  onclick="setFilter(this,'REQUIRES_REVIEW')">REVIEW</button>
  <button class="ghost"  onclick="setFilter(this,'APPROVED')">APPROVED</button>
  <button class="ghost"  onclick="setFilter(this,'BLOCKED')">BLOCKED</button>
  <button class="ghost"  onclick="setFilter(this,'ARCHIVED')">ARCHIVED</button>
  <input id="search" placeholder="Search ID / entity / email…" oninput="renderList()">
</div>

<div class="container">
  <div class="panel">
    <div class="panel-head"><span>REQUESTS</span><span id="listCount">0</span></div>
    <div class="list" id="list"><div class="empty">AUTHENTICATE TO LOAD</div></div>
  </div>

  <div class="panel">
    <div class="panel-head">REQUEST DETAIL</div>
    <div class="detail-wrap">
      <div class="detail" id="detail"><div class="empty">SELECT A REQUEST</div></div>
    </div>
  </div>
</div>

<script>
let data     = [];
let selected = null;
let filter   = '';

function getToken() { return localStorage.getItem('exec_op_token') || ''; }

function saveToken() {
  const t = document.getElementById('token').value.trim();
  if (!t) return;
  localStorage.setItem('exec_op_token', t);
  const rev = document.getElementById('reviewer')?.value?.trim();
  if (rev) localStorage.setItem('exec_op_reviewer', rev);
  document.getElementById('authMsg').textContent = 'SAVED';
  load();
}

function setFilter(btn, f) {
  filter = f;
  document.querySelectorAll('.toolbar button').forEach(b => { b.classList.remove('active'); b.classList.add('ghost'); });
  btn.classList.add('active'); btn.classList.remove('ghost');
  load();
}

function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function fmt(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toISOString().slice(0, 16).replace('T', ' '); } catch { return iso; }
}

function renderKPIs() {
  document.getElementById('kTotal').textContent    = data.length;
  document.getElementById('kReview').textContent   = data.filter(r => r.status === 'REQUIRES_REVIEW' || r.status === 'UNDER_REVIEW').length;
  document.getElementById('kBlocked').textContent  = data.filter(r => r.status === 'BLOCKED').length;
  document.getElementById('kApproved').textContent = data.filter(r => r.status === 'APPROVED').length;
}

async function load() {
  const tok = getToken();
  document.getElementById('token').value = tok;
  document.getElementById('list').innerHTML = '<div class="empty">LOADING…</div>';

  try {
    const url  = '/api/operator-requests' + (filter ? '?status=' + encodeURIComponent(filter) : '');
    const res  = await fetch(url, { headers: { 'x-operator-token': tok } });
    const json = await res.json();

    if (!res.ok || !json.ok) {
      document.getElementById('list').innerHTML = '<div class="empty">AUTH FAILED — CHECK TOKEN</div>';
      document.getElementById('liveLabel').textContent = 'AUTH FAILED';
      document.getElementById('authMsg').textContent   = 'REJECTED';
      return;
    }

    document.getElementById('liveDot').classList.add('on');
    document.getElementById('liveLabel').textContent = 'LIVE';
    document.getElementById('authMsg').textContent   = 'AUTO-REFRESH 15s';

    data = json.requests || [];
    document.getElementById('listCount').textContent = data.length;
    renderKPIs();
    renderList();
    if (!selected && data.length) { selected = data[0].execution_id; renderDetail(); }
    else if (selected) renderDetail();

  } catch (e) {
    document.getElementById('list').innerHTML = '<div class="empty">ERROR: ' + esc(e.message) + '</div>';
    document.getElementById('liveLabel').textContent = 'ERROR';
  }
}

function renderList() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const filtered = data.filter(r => {
    if (!q) return true;
    return [r.execution_id, r.entity, r.email, r.country, r.status].join(' ').toLowerCase().includes(q);
  });

  document.getElementById('listCount').textContent = filtered.length + '/' + data.length;

  // Sort: HIGH priority first, then by created_at desc
  filtered.sort((a, b) => {
    const pa = a._priority === 'HIGH' ? 0 : 1;
    const pb = b._priority === 'HIGH' ? 0 : 1;
    if (pa !== pb) return pa - pb;
    return new Date(b.created_at || 0) - new Date(a.created_at || 0);
  });

  const el = document.getElementById('list');
  if (!filtered.length) { el.innerHTML = '<div class="empty">NO RESULTS</div>'; return; }

  el.innerHTML = filtered.map(r => `
    <div class="item ${selected === r.execution_id ? 'active' : ''}" onclick="pick('${esc(r.execution_id)}')">
      <div class="item-id">${esc(r.execution_id)}</div>
      <div class="item-meta">${esc(r.entity || '—')}<br>${esc(r.email || '—')}<br>${fmt(r.created_at)}</div>
      <div class="badge ${esc(r.status || '')}">${esc(r.status || 'UNKNOWN')}</div>
        ${r._priority === 'HIGH' ? '<div style="font-family:var(--mono);font-size:9px;color:#DC2626;letter-spacing:.1em;margin-top:3px;">' + (r._ageHours >= 48 ? '⛔ SLA BREACHED' : '⚠ HIGH PRIORITY') + '</div>' : ''}
    </div>
  `).join('');
}

function pick(id) {
  selected = id;
  renderList();
  renderDetail();
}

async function renderDetail() {
  const el = document.getElementById('detail');
  const r  = data.find(x => x.execution_id === selected);
  if (!r) { el.innerHTML = '<div class="empty">SELECT A REQUEST</div>'; return; }

  // Load audit trail
  const tok = getToken();
  let auditHtml = '<div class="empty" style="padding:10px 0;">Loading history…</div>';
  el.innerHTML = buildDetailHtml(r, auditHtml);

  try {
    const hRes  = await fetch('/api/operator-history?executionId=' + encodeURIComponent(r.execution_id), {
      headers: { 'x-operator-token': tok }
    });
    const hJson = await hRes.json();
    const actions = hJson.actions || [];

    auditHtml = actions.length
      ? actions.map(a => `
          <div class="audit-line">
            <div class="audit-ts">${fmt(a.created_at)}</div>
            <div class="audit-action">${esc(a.new_status || a.action)}</div>
            <div class="audit-note">${esc(a.reviewed_by || '')} ${a.operator_note ? '· ' + esc(a.operator_note) : ''}</div>
          </div>`).join('')
      : '<div class="audit-note" style="font-family:var(--mono);font-size:10px;color:var(--muted);">No history yet.</div>';

  } catch (_) {
    auditHtml = '<div class="empty" style="padding:8px 0;">History unavailable.</div>';
  }

  el.innerHTML = buildDetailHtml(r, auditHtml);
}

function buildDetailHtml(r, auditHtml) {
  return `
    <div class="section">
      <div class="lbl">EXECUTION ID</div>
      <div class="val mono">${esc(r.execution_id)}</div>
      <div class="badge ${esc(r.status || '')}" style="margin-top:7px;">${esc(r.status || 'UNKNOWN')}</div>
    </div>

    <div class="section grid2">
      <div><div class="lbl">ENTITY</div><div class="val">${esc(r.entity || '—')}</div></div>
      <div><div class="lbl">EMAIL</div><div class="val">${esc(r.email || '—')}</div></div>
      <div><div class="lbl">COUNTRY</div><div class="val">${esc(r.country || '—')}</div></div>
      <div><div class="lbl">SOURCE</div><div class="val mono">${esc(r.source || '—')}</div></div>
      <div><div class="lbl">RISK SCORE</div><div class="val mono">${esc(r.risk_score ?? '—')}</div></div>
      <div><div class="lbl">LOSS EXPOSURE</div><div class="val mono">${r.loss_exposure != null ? '€' + Number(r.loss_exposure).toLocaleString('en-US') : '—'}</div></div>
      <div><div class="lbl">LIFECYCLE</div><div class="val mono">${esc(r.lifecycle || '—')}</div></div>
      <div><div class="lbl">CREATED</div><div class="val mono">${fmt(r.created_at)}</div></div>
    </div>

    <div class="section">
      <div class="lbl">EXECUTION RISK</div>
      <div class="val">${esc(r.risk_note || '—')}</div>
    </div>

    <div class="section">
      <div class="lbl">WHAT HAPPENS IF THIS FAILS</div>
      <div class="val">${esc(r.consequence || '—')}</div>
    </div>

    <div class="section">
      <div class="lbl">OPERATOR NOTE</div>
      <textarea id="note">${esc(r.operator_note || '')}</textarea>
      <div class="actions">
        <button class="amber" onclick="update('UNDER_REVIEW')">REVIEW</button>
        <button class="green"  onclick="update('APPROVED')">APPROVE</button>
        <button class="red"    onclick="update('BLOCKED')">BLOCK</button>
        <button class="ghost"  onclick="update('ARCHIVED')">ARCHIVE</button>
      </div>
      <div id="actionMsg" class="action-msg"></div>
    </div>

    ${r.reviewed_by ? `
    <div class="section">
      <div class="lbl">REVIEWED BY</div>
      <div class="val mono">${esc(r.reviewed_by)} · ${fmt(r.reviewed_at)}</div>
    </div>` : ''}

    <div class="section">
      <div class="lbl">AUDIT TRAIL</div>
      ${auditHtml}
    </div>

    <div class="section">
      <div class="lbl">PAYLOAD</div>
      <pre>${esc(JSON.stringify(r.payload || {}, null, 2))}</pre>
    </div>

    <div class="section">
      <div class="lbl">RESULT / TRACE</div>
      <pre>${esc(JSON.stringify(r.result || {}, null, 2))}</pre>
    </div>
  `;
}

async function update(status) {
  const tok  = getToken();
  const note = document.getElementById('note')?.value || '';
  const msg  = document.getElementById('actionMsg');
  if (!selected) return;
  if (msg) msg.textContent = 'UPDATING…';

  try {
    const res  = await fetch('/api/operator-update', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'x-operator-token': tok },
      body:    JSON.stringify({ executionId: selected, status, operatorNote: note, reviewedBy: document.getElementById('reviewer')?.value?.trim() || localStorage.getItem('exec_op_reviewer') || 'operator' })
    });
    const json = await res.json();
    if (!res.ok || !json.ok) { if (msg) msg.textContent = 'FAILED: ' + (json.error || ''); return; }
    const emailInfo = (status === 'APPROVED' || status === 'BLOCKED')
      ? (json.clientEmailOk ? ' · EMAIL SENT' : ' · EMAIL FAILED')
      : '';
    if (msg) msg.textContent = 'UPDATED → ' + status + emailInfo;
    selected = json.record.executionId;
    await load();
  } catch (e) {
    if (msg) msg.textContent = 'ERROR: ' + e.message;
  }
}

// Auto-refresh every 15s
setInterval(() => { if (getToken()) load(); }, 15000);

window.addEventListener('DOMContentLoaded', () => {
  const saved = getToken();
  if (saved) { document.getElementById('token').value = saved; load(); }
  const savedRev = localStorage.getItem('exec_op_reviewer');
  if (savedRev) { const r = document.getElementById('reviewer'); if(r) r.value = savedRev; }
});
</script>
</body>
</html>

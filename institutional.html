<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXECUTIA — Institutional Standard</title>
  <style>
    :root {
      --bg: #000000; --text: #FFFFFF; --text-dim: #777; --border: #1A1A1A;
      --control: #2563EB; --nav-h: 56px; --font-main: 'Inter', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; transition: none !important; text-rendering: optimizeLegibility; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-main); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    
    .sys-nav { height: var(--nav-h); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 48px; background: #000; z-index: 1000; position: sticky; top: 0; }
    .nav-logo { font-weight: 800; letter-spacing: 0.08em; font-size: 15px; text-decoration: none; color: #FFF; }
    .nav-links { margin-left: auto; display: flex; gap: 32px; }
    .nav-links a { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; color: #444; }
    .nav-links a.active { color: var(--control); opacity: 1; }
    a:focus { outline: 1px solid var(--control); outline-offset: 2px; }

    .sovereign-container { margin-top: 80px; max-width: 760px; margin-left: calc(10% + 0.5px); padding: 64px 32px; }
    .article { margin-bottom: 140px; display: flex; flex-direction: column; gap: 16px; }
    .article-header { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); }
    .article-body { font-size: 17px; font-weight: 600; line-height: 1.3; max-width: 560px; }

    .gate-footer { margin-top: 32px; padding-top: 64px; border-top: 1px solid var(--border); }
    .briefing-cta { display: inline-block; border: 1px solid #333; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; padding: 12px 20px; text-decoration: none; color: #AAA; text-transform: uppercase; }
    .briefing-cta:hover { border-color: #FFF; color: #FFF; }
    .briefing-cta:active { transform: translateY(1px); }
    
    .status-line { margin-top: 140px; font-family: var(--font-mono); font-size: 9px; color: #333; letter-spacing: 0.14em; text-transform: uppercase; }
  </style>
</head>
<body>
  <nav class="sys-nav">
    <a href="/" class="nav-logo">EXECUTIA</a>
    <div class="nav-links">
      <a href="/system.html">System</a>
      <a href="/institutional.html" class="active">Institutional</a>
    </div>
  </nav>
  <main class="sovereign-container">
    <section class="article">
      <span class="article-header">Article 01 — Integrity</span>
      <p class="article-body">Non-authorized execution is structurally impossible. Control is binary.</p>
    </section>
    <section class="article">
      <span class="article-header">Article 02 — Sovereignty</span>
      <p class="article-body">Full decision-to-result transparency across all command layers.</p>
    </section>
    <footer class="gate-footer">
      <a href="mailto:access@executia.io" class="briefing-cta">[ Private Briefing Request ]</a>
      <div class="status-line">GOVERNANCE_LAYER: V1.0 // SOVEREIGN_GRADE: ACTIVE</div>
    </footer>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXECUTIA — Institutional Layer</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* 🔥 FORCE LIGHT MODE (NO OVERRIDE POSSIBLE) */
html, body {
  background: #ffffff !important;
  color: #111111 !important;
  font-family: 'JetBrains Mono', monospace;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 80px 40px;
}

/* STATUS */
.status {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #dc2626;
  margin-bottom: 8px;
}

.substatus {
  font-size: 11px;
  color: #6b7280;
  margin-bottom: 50px;
}

/* DIVIDER */
.divider {
  border-top: 1px solid #e5e7eb;
  margin: 50px 0;
}

/* HEADLINE */
h1 {
  font-size: 44px;
  font-weight: 500;
  margin-bottom: 20px;
}

.subline {
  color: #6b7280;
  line-height: 1.7;
  margin-bottom: 70px;
}

/* TEXT */
.block {
  font-size: 20px;
  line-height: 1.8;
  margin-bottom: 40px;
}

/* FORM */
form {
  margin-top: 30px;
}

input, textarea {
  width: 100%;
  border: 1px solid #e5e7eb;
  padding: 14px;
  margin-bottom: 12px;
  font-family: inherit;
  font-size: 13px;
  background: #fff;
}

textarea {
  height: 120px;
}

/* BUTTON */
button {
  border: 1px solid #dc2626;
  color: #dc2626;
  background: transparent;
  padding: 14px;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #dc2626;
  color: white;
}

/* RESULT */
.result {
  margin-top: 20px;
  font-size: 12px;
  letter-spacing: 0.15em;
}

.accepted { color: #2563eb; }
.review   { color: #6b7280; }
.rejected { color: #dc2626; }

/* FADE IN (layer effect) */
body {
  opacity: 0;
  transition: opacity 0.6s ease;
}
body.loaded {
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">

  <div class="status">STATUS: NON-OPTIONAL</div>
  <div class="substatus">SYSTEM STATUS: ACTIVE SPECIFICATION</div>

  <div class="divider"></div>

  <h1>Institutional Execution Layer</h1>

  <div class="subline">
    A standard for governments, infrastructure, and large-scale systems.
  </div>

  <div class="divider"></div>

  <div class="block">
    Execution is not controlled at the point of decision.
  </div>

  <div class="block">
    EXECUTIA establishes control at the point of execution.
  </div>

  <div class="divider"></div>

  <!-- FORM -->
  <form id="form">
    <input placeholder="Organization" required>
    <input placeholder="Country" required>
    <input placeholder="Role" required>
    <input type="email" placeholder="Official Email" required>
    <textarea placeholder="System context"></textarea>

    <button>SUBMIT TO SYSTEM</button>
  </form>

  <div id="result" class="result"></div>

</div>

<script>
// Fade in
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

// Form submit
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const f = e.target.querySelectorAll("input,textarea");

  const data = {
    organization: f[0].value,
    country: f[1].value,
    role: f[2].value,
    email: f[3].value,
    message: f[4].value
  };

  const res = await fetch("/api/access", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const r = await res.json();
  const el = document.getElementById("result");

  el.className = "result";

  if (r.status === "ACCEPTED") {
    el.classList.add("accepted");
  } else if (r.status === "UNDER_REVIEW") {
    el.classList.add("review");
  } else {
    el.classList.add("rejected");
  }

  el.innerText = r.status;
});
</script>

</body>
</html>

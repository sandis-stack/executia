<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXECUTIA — REQUEST STATUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --black:   #000;
  --white:   #fff;
  --g500:    #888;
  --g700:    #444;
  --control: #0A1F44;
  --green:   #006b08;
  --yellow:  #9a6e00;
  --red:     #bb0000;
  --border:  1px solid #000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--white); color: var(--black); font-size: 14px; -webkit-font-smoothing: antialiased; }
.mono { font-family: 'JetBrains Mono', monospace; }
a { color: inherit; text-decoration: none; }

header { border-bottom: var(--border); padding: 0 32px; height: 54px; display: flex; align-items: center; justify-content: space-between; }
.h-logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; letter-spacing: 0.22em; }
.h-state { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--control); font-weight: 700; letter-spacing: 0.12em; }

.main { max-width: 720px; margin: 0 auto; padding: 60px 32px 80px; }
.lbl { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--g500); margin-bottom: 20px; }
.exec-id { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 8px; }
.exec-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--g500); letter-spacing: 0.1em; margin-bottom: 48px; }

.timeline { border: var(--border); margin-bottom: 32px; }
.tl-header { border-bottom: var(--border); padding: 12px 20px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--g500); display: grid; grid-template-columns: 90px 1fr 160px; gap: 16px; }
.tl-row { padding: 12px 20px; font-family: 'JetBrains Mono', monospace; font-size: 12px; display: grid; grid-template-columns: 90px 1fr 160px; gap: 16px; align-items: center; border-bottom: 1px solid #eee; opacity: 0; transform: translateY(4px); transition: opacity 0.3s ease, transform 0.3s ease; }
.tl-row:last-child { border-bottom: none; }
.tl-row.vis { opacity: 1; transform: translateY(0); }
.tl-time { color: var(--g500); font-size: 11px; }
.tl-code { font-weight: 700; letter-spacing: 0.1em; }
.tl-state { font-weight: 700; letter-spacing: 0.08em; text-align: right; }

.final-block { border: 3px solid var(--black); padding: 32px; margin-bottom: 32px; opacity: 0; transition: opacity 0.4s ease; }
.final-block.vis { opacity: 1; }
.final-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--g500); margin-bottom: 12px; }
.final-status { font-size: clamp(20px, 3vw, 28px); font-weight: 700; letter-spacing: 0.04em; margin-bottom: 16px; }
.final-detail { font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 2; color: var(--g700); white-space: pre-line; }

.back-link { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--g500); border-bottom: 1px solid var(--g500); padding-bottom: 1px; }
.back-link:hover { color: var(--black); border-color: var(--black); }

footer { border-top: var(--border); padding: 24px 32px; max-width: 720px; margin: 0 auto; }
footer p { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--g500); line-height: 1.9; }
</style>
</head>
<body>

<header>
  <a href="https://www.executia.io/" class="h-logo">EXECUTIA</a>
  <div class="h-state">STATE: REQUEST STATUS</div>
</header>

<main class="main">
  <div class="lbl">EXECUTION STATUS REPORT</div>
  <div class="exec-id" id="exec-id">—</div>
  <div class="exec-sub" id="exec-sub">RETRIEVING DATA...</div>

  <div class="timeline">
    <div class="tl-header">
      <span>TIME</span>
      <span>EVENT</span>
      <span style="text-align:right;">STATE</span>
    </div>
    <div id="tl-body"></div>
  </div>

  <div class="final-block" id="final-block">
    <div class="final-label">SYSTEM DECISION</div>
    <div class="final-status" id="final-status">—</div>
    <div class="final-detail" id="final-detail"></div>
    <div id="contact-line" style="display:none;margin-top:20px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--g500);">
      CONTACT: <a href="#" onclick="return false" style="color:var(--control);">info [at] executia [dot] io</a>
    </div>
  </div>

  <a href="https://execution.executia.io" class="back-link">&lt; RETURN TO EXECUTION LAYER</a>
</main>

<footer>
  <p>EXECUTIA™ — EXECUTION CONTROL PROTOCOL</p>
  <p>PCT/IB2026/050141 — STATUS: PENDING</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsKJ3U49P0vtaLIRz3aTlZ8l4vg-lm3Ec",
  authDomain: "executia-system.firebaseapp.com",
  projectId: "executia-system",
  storageBucket: "executia-system.firebasestorage.app",
  messagingSenderId: "846608294000",
  appId: "1:846608294000:web:45cc89730a7282e68994b5"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const id  = new URL(window.location.href).searchParams.get('id') || '';
const now = new Date();
const ts  = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

document.getElementById('exec-id').textContent = id || 'ID NOT PROVIDED';
document.getElementById('exec-sub').textContent =
  'QUERIED: ' + now.toLocaleDateString('en-GB') + ' ' + ts + '  ·  SOURCE: EXECUTION.EXECUTIA.IO';

const tlBody = document.getElementById('tl-body');

function addRow(code, state, color, delay) {
  setTimeout(() => {
    const row = document.createElement('div');
    row.className = 'tl-row mono';
    row.innerHTML =
      '<span class="tl-time">' + ts + '</span>' +
      '<span class="tl-code">' + code + '</span>' +
      '<span class="tl-state" style="color:' + color + '">' + state + '</span>';
    tlBody.appendChild(row);
    requestAnimationFrame(() => row.classList.add('vis'));
  }, delay);
}

function showFinal(status, detail, color, delay) {
  setTimeout(() => {
    document.getElementById('final-status').textContent     = status;
    document.getElementById('final-status').style.color     = color;
    document.getElementById('final-detail').textContent     = detail;
    document.getElementById('final-block').style.borderColor = color;
    document.getElementById('final-block').classList.add('vis');
    var cl = document.getElementById('contact-line');
    if (cl) cl.style.display = 'block';
  }, delay);
}

async function loadStatus() {
  if (!id) {
    addRow('SYSTEM', 'ID MISSING', 'var(--red)', 300);
    showFinal('REQUEST NOT FOUND', 'Provide a valid Execution ID.\nExample: /status.html?id=EX-A91F3', 'var(--red)', 800);
    return;
  }

  addRow('REQUEST',    'RECEIVED',     'var(--control)', 300);
  addRow('STRUCTURE',  'VALIDATED',    'var(--control)', 700);
  addRow('CONSTRAINT', 'CHECK PASSED', 'var(--control)', 1100);

  try {
    const q    = query(collection(db, 'leads'), where('executionId', '==', id));
    const snap = await getDocs(q);

    if (snap.empty) {
      addRow('LOOKUP', 'NOT FOUND', 'var(--red)', 1500);
      showFinal('ID NOT FOUND',
        'EXECUTION ID:  ' + id + '\nSTATUS:        UNKNOWN\nACTION:        Verify your ID and try again.\nCONTACT:       info@executia.io',
        'var(--red)', 2000);
      return;
    }

    const data = snap.docs[0].data();
    const st   = data.status || 'NEW';

    if (st === 'NEW') {
      addRow('STATUS', 'RECEIVED', 'var(--control)', 1500);
      addRow('QUEUE',  'ACTIVE',   'var(--control)', 1900);
      showFinal('REQUEST RECEIVED',
        'EXECUTION ID:  ' + id + '\nCOMPANY:       ' + (data.company||'—') + '\nSTATUS:        PENDING REVIEW\nAUTHORITY:     SYSTEM\nNEXT STEP:     System evaluation in progress',
        'var(--control)', 2400);

    } else if (st === 'VALIDATED') {
      addRow('STATUS', 'UNDER REVIEW', 'var(--yellow)', 1500);
      addRow('QUEUE',  'PRIORITY',     'var(--yellow)', 1900);
      showFinal('ACCESS UNDER REVIEW',
        'EXECUTION ID:  ' + id + '\nCOMPANY:       ' + (data.company||'—') + '\nSTATUS:        UNDER REVIEW\nAUTHORITY:     SYSTEM\nNEXT STEP:     System contact within 48h',
        'var(--yellow)', 2400);

    } else if (st === 'EXECUTING') {
      addRow('RISK',     'ACCEPTABLE', 'var(--green)', 1500);
      addRow('DECISION', 'AUTHORIZED', 'var(--green)', 1900);
      const capVal = data.protectedValue ? '€' + Number(data.protectedValue).toLocaleString() : 'CALCULATED ON AUDIT';
      const lossVal = data.protectedValue ? '€' + Math.round(data.protectedValue * 1.5).toLocaleString() : 'N/A';
      showFinal('ACCESS GRANTED',
        'EXECUTION ID:  ' + id + '\nCOMPANY:       ' + (data.company||'—') + '\nSTATUS:        AUTHORIZED\nPRIORITY:      ELEVATED\nCAPITAL PRESERVED: ' + capVal + '\nEST. LOSS WITHOUT EXECUTIA: ' + lossVal + '\nDECISION:      EXECUTION CONTROL REQUIRED\nSYSTEM CONFIDENCE: HIGH\nAUTHORITY:     SYSTEM\nOVERRIDE:      DISABLED\nNEXT STEP:     Operator will contact directly',
        'var(--green)', 2400);

    } else if (st === 'CLOSED') {
      addRow('DECISION', 'CLOSED', 'var(--g500)', 1500);
      showFinal('REQUEST CLOSED',
        'EXECUTION ID:  ' + id + '\nCOMPANY:       ' + (data.company||'—') + '\nSTATUS:        CLOSED\nACTION:        Contact info@executia.io for details',
        'var(--g500)', 2000);
    }

  } catch
</body>
</html>

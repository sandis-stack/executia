<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXECUTIA — Standard Layer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FFFFFF; --text: #111111; --text-soft: #666666; --border: #E5E5E5;
      --control: #2563EB; --nav-h: 56px; --font-main: 'Inter', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; transition: none !important; text-rendering: optimizeLegibility; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-main); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    
    .sys-nav { height: var(--nav-h); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 48px; position: sticky; top: 0; background: #FFF; z-index: 1000; }
    .nav-logo { font-weight: 800; letter-spacing: 0.08em; font-size: 15px; text-decoration: none; color: var(--text); }
    .nav-links { margin-left: auto; display: flex; gap: 32px; }
    .nav-links a { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; color: #777; opacity: 0.7; }
    .nav-links a:hover { opacity: 1; }
    a:focus { outline: 1px solid var(--control); outline-offset: 2px; }

    .gate-container { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 760px; margin-left: calc(10% + 0.5px); padding: 64px 32px; }
    .gate-h1 { font-size: 42px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.05; text-transform: uppercase; margin-bottom: 16px; }
    .gate-sub { font-size: 16px; color: var(--text-soft); max-width: 440px; line-height: 1.4; margin-bottom: 48px; }
    
    .gate-diagram { display: flex; align-items: center; gap: 16px; margin-bottom: 64px; }
    .node { width: 12px; height: 12px; border: 1px solid #DCDCDC; }
    .node--active { width: 16px; height: 16px; border: 2px solid var(--control); }
    .connector { width: 32px; height: 1px; background: #E5E5E5; }

    .gate-actions { display: flex; gap: 16px; }
    .btn-gate { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none; padding: 12px 16px; border: 1px solid var(--border); color: #777; cursor: pointer; }
    .btn-gate--primary { border-color: var(--control); color: var(--control); }
    .btn-gate--primary:hover { background: var(--control); color: #FFF; }
    .btn-gate:active { transform: translateY(1px); }

    .status-line { padding: 24px 48px; font-family: var(--font-mono); font-size: 10px; color: #AAA; letter-spacing: 0.14em; text-transform: uppercase; margin-left: calc(10% + 0.5px); }
  </style>
</head>
<body>
  <nav class="sys-nav">
    <a href="/" class="nav-logo">EXECUTIA</a>
    <div class="nav-links">
      <a href="/system.html">System</a>
      <a href="/institutional.html">Institutional</a>
    </div>
  </nav>
  <main class="gate-container">
    <h1 class="gate-h1">EXECUTION IS THE ONLY THING THAT MATTERS.</h1>
    <p class="gate-sub">A structural control layer between decision and result.</p>
    <div class="gate-diagram">
      <div class="node"></div><div class="connector"></div>
      <div class="node node--active"></div><div class="connector"></div>
      <div class="node"></div>
    </div>
    <div class="gate-actions">
      <a href="/system.html" class="btn-gate btn-gate--primary">Access System Layer</a>
      <a href="/institutional.html" class="btn-gate">Institutional Standards</a>
    </div>
  </main>
  <footer class="status-line">EXECUTIA STANDARD · ACTIVE</footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXECUTIA — Standard Layer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ── ENTRY V4.1 — WHITE PROTOCOL (DOCUMENT GRADE) ───── */
    :root {
      --bg:        #FFFFFF;
      --text:      #111111;
      --text-soft: #666666;
      --border:    #E5E5E5;
      --control:   #2563EB;
      --nav-h:     56px;
      --font-main: 'Inter', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ─────────────────────────────────────────────── */
    .sys-nav {
      height: var(--nav-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 48px;
      flex-shrink: 0;
    }
    .nav-logo {
      font-weight: 800;
      text-decoration: none;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .nav-links {
      margin-left: auto;
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-soft);
      text-decoration: none;
      transition: none;
    }

    /* ── GATE CONTAINER ──────────────────────────────────── */
    .gate-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      max-width: 820px;
      margin-left: 10%;
      padding: 0 32px;
    }

    .gate-h1 {
      font-size: 38px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.01em;
      margin: 0 0 16px 0;
      text-transform: uppercase;
      line-height: 1.0;
    }

    .gate-sub {
      font-size: 17px;
      color: var(--text-soft);
      max-width: 520px;
      line-height: 1.5;
      margin-bottom: 64px;
    }

    /* ── SYSTEM DIAGRAM ──────────────────────────────────── */
    .gate-diagram {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 72px;
    }
    .node {
      width: 14px; height: 14px;
      background: transparent;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .node--active {
      width: 18px; height: 18px;
      border: 2px solid var(--control);
      box-shadow: none;
    }
    .connector {
      width: 36px; height: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── GATE ACTIONS ────────────────────────────────────── */
    .gate-actions {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .btn-gate {
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-decoration: none;
      padding: 12px 20px;
      transition: none;
      display: inline-block;
    }
    .btn-gate--primary {
      border: 1px solid var(--control);
      color: var(--control);
    }
    .btn-gate--primary:hover {
      background: var(--control);
      color: #FFFFFF;
    }
    .btn-gate--secondary {
      border: 1px solid var(--border);
      color: var(--text-soft);
    }
    .btn-gate--secondary:hover {
      border-color: #999;
      color: var(--text);
    }

    /* ── STATUS LINE ─────────────────────────────────────── */
    .status-line {
      position: absolute;
      bottom: 24px;
      left: 48px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: #999999;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <nav class="sys-nav">
    <a href="https://executia.io" class="nav-logo">EXECUTIA</a>
    <div class="nav-links">
      <a href="https://execution.executia.io">System</a>
      <a href="https://executia.io/institutional.html">Institutional</a>
    </div>
  </nav>

  <main class="gate-container">
    <h1 class="gate-h1">EXECUTION IS THE ONLY THING THAT MATTERS.</h1>
    <p class="gate-sub">A structural control layer between decision and result.</p>

    <div class="gate-diagram">
      <div class="node"></div>
      <div class="connector"></div>
      <div class="node node--active"></div>
      <div class="connector"></div>
      <div class="node"></div>
    </div>

    <div class="gate-actions">
      <a href="https://execution.executia.io" class="btn-gate btn-gate--primary">Access System Layer</a>
      <a href="https://executia.io/institutional.html" class="btn-gate btn-gate--secondary">Institutional Standards</a>
    </div>

    <div class="status-line">EXECUTIA STANDARD · ACTIVE</div>
  </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXECUTIA — Standard Layer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  
  <style>
    /* ── ENTRY V4.4 — ABSOLUTE PRODUCTION LOCK ──────────── */
    :root {
      --bg:        #FFFFFF;
      --text:      #111111;
      --text-soft: #666666;
      --border:    #E5E5E5;
      --control:   #2563EB;
      --nav-h:     56px;
      --font-main: 'Inter', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; padding: 0; 
      transition: none !important; 
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV (56px TECH LOCK) ─────────────────────────── */
    .sys-nav {
      height: var(--nav-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 48px;
      position: sticky;
      top: 0;
      background: #FFFFFF;
      z-index: 1000;
    }

    .nav-logo {
      font-weight: 800;
      text-decoration: none;
      color: var(--text);
      letter-spacing: 0.08em; /* MICRO AUTHORITY BOOST */
      font-size: 15px;
    }

    .nav-links {
      margin-left: auto;
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      color: #777777;
      opacity: 0.7;
      text-decoration: none;
      letter-spacing: 0.12em;
    }

    .nav-links a:hover { opacity: 1; }
    .nav-links a.active { color: var(--control); opacity: 1; }

    /* ── SYSTEM INTERFACE ────────────────────────────── */
    .gate-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      max-width: 760px; 
      margin-left: 10%; 
      padding: 64px 32px;
    }

    .gate-h1 {
      font-size: 42px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.025em;
      margin: 0 0 16px 0;
      text-transform: uppercase;
      line-height: 1.02;
    }

    .gate-sub {
      font-size: 16px;
      color: var(--text-soft);
      max-width: 440px;
      line-height: 1.4;
      margin-bottom: 56px;
    }

    /* ── SYSTEM DIAGRAM ──────────────────────────────── */
    .gate-diagram {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 64px;
    }

    .node {
      width: 12px; height: 12px;
      background: transparent;
      border: 1px solid #DCDCDC;
    }

    .node--active {
      width: 16px; height: 16px;
      border: 2px solid var(--control);
    }

    .connector {
      width: 32px; height: 1px;
      background: #E5E5E5;
    }

    /* ── ACCESS PROTOCOL (COMMAND FEEL) ──────────────── */
    .gate-actions {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-gate {
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      text-decoration: none;
      padding: 10px 16px;
      display: inline-block;
      cursor: pointer;
    }

    /* CLICK FEEDBACK - MECHANICAL REACTION */
    .btn-gate:active {
      transform: translateY(1px);
    }

    .btn-gate--primary {
      border: 1px solid var(--control);
      color: var(--control);
    }

    .btn-gate--primary:hover {
      background: var(--control);
      color: #FFFFFF;
    }

    .btn-gate--secondary {
      border: 1px solid var(--border);
      color: #777777;
    }

    .btn-gate--secondary:hover {
      border-color: #BBBBBB;
      color: var(--text);
    }

    /* ── SYSTEM SIGNATURE ────────────────────────────── */
    .status-line {
      padding: 24px 48px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: #AAAAAA;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <nav class="sys-nav">
    <a href="/" class="nav-logo">EXECUTIA</a>
    <div class="nav-links">
      <a href="https://execution.executia.io">System</a>
      <a href="/institutional">Institutional</a>
    </div>
  </nav>

  <main class="gate-container">
    <h1 class="gate-h1">EXECUTION IS THE ONLY THING THAT MATTERS.</h1>
    <p class="gate-sub">A structural control layer between decision and result.</p>

    <div class="gate-diagram">
      <div class="node"></div>
      <div class="connector"></div>
      <div class="node node--active"></div>
      <div class="connector"></div>
      <div class="node"></div>
    </div>

    <div class="gate-actions">
      <a href="https://execution.executia.io" class="btn-gate btn-gate--primary">Access System Layer</a>
      <a href="/institutional" class="btn-gate btn-gate--secondary">Institutional Standards</a>
    </div>
  </main>

  <footer class="status-line">
    EXECUTIA STANDARD · ACTIVE
  </footer>

</body>
</html>

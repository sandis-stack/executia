<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- 2x2 grid icon -->
  <!-- Top-left cell -->
  <rect x="2" y="2" width="20" height="20" stroke="#1E3A6E" stroke-width="2.5" fill="none"/>
  <!-- Top-right cell -->
  <rect x="22" y="2" width="20" height="20" stroke="#1E3A6E" stroke-width="2.5" fill="none"/>
  <!-- Bottom-left cell -->
  <rect x="2" y="22" width="20" height="20" stroke="#1E3A6E" stroke-width="2.5" fill="none"/>
  <!-- Bottom-right cell -->
  <rect x="22" y="22" width="20" height="20" stroke="#1E3A6E" stroke-width="2.5" fill="none"/>
  <!-- Diagonal arrow bottom-left to top-right -->
  <line x1="6" y1="38" x2="37" y2="7" stroke="#1E3A6E" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="44,4 34,8 38,18" fill="#1E3A6E"/>
  <!-- EXECUTIA text -->
  <text x="56" y="30" font-family="'DM Sans', Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="3" fill="#1E3A6E" text-anchor="start">EXECUTIA</text>
</svg>

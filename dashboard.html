<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXECUTIA — CONTROL PANEL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000;
    --white: #fff;
    --g100: #f5f5f5;
    --g300: #ccc;
    --g500: #888;
    --g700: #444;
    --control: #0A1F44;
    --green: #006b08;
    --yellow: #9a6e00;
    --red: #bb0000;
    --border: 1px solid #000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--white);
    color: var(--black);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  header {
    border-bottom: var(--border);
    padding: 0 32px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 10;
  }
  .h-logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; letter-spacing: 0.22em; }
  .h-meta { display: flex; align-items: center; gap: 20px; }
  .h-state { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--control); font-weight: 700; letter-spacing: 0.12em; }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .live-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--green); letter-spacing: 0.1em; }

  .main { max-width: 1100px; margin: 0 auto; padding: 40px 32px; }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-box { border: var(--border); padding: 14px 18px; }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--g500); margin-bottom: 8px; }
  .stat-val { font-size: 26px; font-weight: 700; }

  .pipeline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--g500);
    margin-bottom: 24px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .pipe-step { padding: 4px 10px; border: 1px solid var(--g300); }
  .pipe-arr { color: var(--g300); }

  .controls { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border: var(--border);
    background: var(--white);
    cursor: pointer;
  }
  .filter-btn.active { background: var(--control); color: var(--white); }

  .sort-select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border: var(--border);
    background: var(--white);
    cursor: pointer;
    margin-left: auto;
  }

  .table-header {
    display: grid;
    grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1.2fr 0.7fr;
    gap: 12px;
    padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--g500);
    border-bottom: var(--border);
  }

  .lead-row {
    display: grid;
    grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1.2fr 0.7fr;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
    align-items: center;
    transition: background 0.15s;
  }
  .lead-row:hover { background: var(--g100); }

  .lead-company { font-weight: 600; }
  .lead-email { font-size: 11px; color: var(--g500); margin-top: 2px; }

  .score-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border: 1px solid;
    display: inline-block;
  }
  .score-high { color: var(--green); border-color: var(--green); }
  .score-mid  { color: var(--yellow); border-color: var(--yellow); }
  .score-low  { color: var(--g500); border-color: var(--g300); }

  .status-select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    padding: 4px 6px;
    border: var(--border);
    background: var(--white);
    cursor: pointer;
    width: 100%;
  }
  .status-NEW       { color: var(--control); border-color: var(--control); }
  .status-VALIDATED { color: var(--yellow);  border-color: var(--yellow); }
  .status-EXECUTING { color: var(--green);   border-color: var(--green); }
  .status-CLOSED    { color: var(--g500);    border-color: var(--g300); }

  .ts { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--g500); }
  .msg { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--g500); padding: 40px 16px; }

  .new-flash { animation: newrow 1s ease; }
  @keyframes newrow { 0%{background:#e8f0fe} 100%{background:transparent} }

  @media (max-width: 800px) {
    .stats { grid-template-columns: repeat(3,1fr); }
    .table-header, .lead-row { grid-template-columns: 2fr 1fr 1fr 1fr; }
    .table-header span:nth-child(n+5), .lead-row div:nth-child(n+5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="h-logo">EXECUTIA</div>
  <div class="h-meta">
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="live-dot"></div>
      <span class="live-label">LIVE</span>
    </div>
    <div class="h-state">STATE: CONTROL PANEL</div>
  </div>
</header>

<main class="main">

  <div class="pipeline">
    <span class="pipe-step" style="color:var(--control);border-color:var(--control);">NEW</span>
    <span class="pipe-arr">→</span>
    <span class="pipe-step" style="color:var(--yellow);border-color:var(--yellow);">VALIDATED</span>
    <span class="pipe-arr">→</span>
    <span class="pipe-step" style="color:var(--green);border-color:var(--green);">EXECUTING</span>
    <span class="pipe-arr">→</span>
    <span class="pipe-step">CLOSED</span>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">TOTAL</div>
      <div class="stat-val" id="s-total">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">NEW</div>
      <div class="stat-val" id="s-new" style="color:var(--control);">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">VALIDATED</div>
      <div class="stat-val" id="s-val" style="color:var(--yellow);">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">EXECUTING</div>
      <div class="stat-val" id="s-exec" style="color:var(--green);">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">CLOSED</div>
      <div class="stat-val" id="s-closed" style="color:var(--g500);">—</div>
    </div>
  </div>

  <div class="controls">
    <button class="filter-btn active" data-filter="ALL">ALL</button>
    <button class="filter-btn" data-filter="NEW">NEW</button>
    <button class="filter-btn" data-filter="VALIDATED">VALIDATED</button>
    <button class="filter-btn" data-filter="EXECUTING">EXECUTING</button>
    <button class="filter-btn" data-filter="CLOSED">CLOSED</button>
    <select class="sort-select" id="sort-select">
      <option value="date">SORT: NEWEST</option>
      <option value="score">SORT: PRIORITY</option>
      <option value="budget">SORT: BUDGET</option>
    </select>
  </div>

  <div class="table-header">
    <span>COMPANY / EMAIL</span>
    <span>SYSTEM TYPE</span>
    <span>VOLUME</span>
    <span>PERSON</span>
    <span>EXEC ID</span>
    <span>STATUS</span>
    <span>DATE</span>
  </div>

  <div id="leads"><div class="msg">CONNECTING TO SYSTEM...</div></div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsKJ3U49P0vtaLIRz3aTlZ8l4vg-lm3Ec",
  authDomain: "executia-system.firebaseapp.com",
  projectId: "executia-system",
  storageBucket: "executia-system.firebasestorage.app",
  messagingSenderId: "846608294000",
  appId: "1:846608294000:web:45cc89730a7282e68994b5"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const statuses = ['NEW','VALIDATED','EXECUTING','CLOSED'];
let allLeads = [];
let activeFilter = 'ALL';

function calculateScore(data) {
  let score = 0;
  const vol = data.volume || data.budget || '';
  if (vol.includes('1B')) score += 8;
  else if (vol.includes('100M')) score += 6;
  else if (vol.includes('10M')) score += 4;
  else if (vol.includes('1M')) score += 2;
  if (data.executionId) score += 1;
  return score;
}

function scoreBadge(score) {
  if (score >= 6) return `<span class="score-badge score-high">P${score}</span>`;
  if (score >= 3) return `<span class="score-badge score-mid">P${score}</span>`;
  return `<span class="score-badge score-low">P${score}</span>`;
}

function formatDate(ts) {
  if (!ts) return '—';
  try { return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'2-digit'}); }
  catch(e) { return '—'; }
}

function updateStats() {
  document.getElementById('s-total').textContent  = allLeads.length;
  document.getElementById('s-new').textContent    = allLeads.filter(l=>l.data.status==='NEW').length;
  document.getElementById('s-val').textContent    = allLeads.filter(l=>l.data.status==='VALIDATED').length;
  document.getElementById('s-exec').textContent   = allLeads.filter(l=>l.data.status==='EXECUTING').length;
  document.getElementById('s-closed').textContent = allLeads.filter(l=>l.data.status==='CLOSED').length;
}

function renderAll() {
  const container = document.getElementById('leads');
  const sortVal   = document.getElementById('sort-select').value;

  let filtered = activeFilter === 'ALL'
    ? [...allLeads]
    : allLeads.filter(l => l.data.status === activeFilter);

  if (sortVal === 'score') {
    filtered.sort((a,b) => calculateScore(b.data) - calculateScore(a.data));
  } else if (sortVal === 'budget') {
    filtered.sort((a,b) => (parseInt(b.data.budget)||0) - (parseInt(a.data.budget)||0));
  } else {
    filtered.sort((a,b) => (b.data.timestamp||'').localeCompare(a.data.timestamp||''));
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="msg">NO LEADS IN THIS CATEGORY</div>';
    return;
  }

  container.innerHTML = '';
  filtered.forEach(({id, data}) => {
    const score = calculateScore(data);
    const row   = document.createElement('div');
    row.className = 'lead-row';
    row.innerHTML = `
      <div>
        <div class="lead-company">${data.company||'—'}</div>
        <div class="lead-email">${data.email||''}</div>
      </div>
      <div style="font-size:12px;color:var(--g700);">${data.system_type||data.project||'—'}</div>
      <div class="mono" style="font-size:12px;">${data.volume||data.budget||'—'}</div>
      <div class="mono" style="font-size:11px;color:var(--g500);">${data.person||'—'}</div>
      <div class="mono" style="font-size:11px;color:var(--control);">${data.executionId||'—'}</div>
      <div>
        <select class="status-select status-${data.status||'NEW'}" data-id="${id}">
          ${statuses.map(s=>`<option ${data.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="ts">${formatDate(data.timestamp)}</div>
    `;
    container.appendChild(row);
  });
}

// Live listener
onSnapshot(collection(db,'leads'), (snapshot) => {
  const prevCount = allLeads.length;
  allLeads = [];
  snapshot.forEach(d => allLeads.push({id: d.id, data: d.data()}));
  updateStats();
  renderAll();
  // flash if new lead arrived
  if (allLeads.length > prevCount && prevCount > 0) {
    const rows = document.querySelectorAll('.lead-row');
    if (rows[0]) rows[0].classList.add('new-flash');
  }
}, (err) => {
  document.getElementById('leads').innerHTML = '<div class="msg">ERROR: '+err.message+'</div>';
});

// Status change
document.addEventListener('change', async (e) => {
  if (e.target.matches('.status-select')) {
    const id = e.target.dataset.id;
    const newStatus = e.target.value;
    e.target.className = 'status-select status-'+newStatus;
    await updateDoc(doc(db,'leads',id), {status: newStatus});
  }
  if (e.target.id === 'sort-select') renderAll();
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderAll();
  });
});
</script>
</body>
</html>
